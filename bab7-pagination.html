<body>
    <div class="container mt-4">
        <h1>Cara membuat peginition Dengan Bootstrap</h1>

        <!--Pagination default-->
        <nav aria-label="pagination">
            <ul class="pagination">
                <li class="page-item"><a class="page-link">1</a></li>
                <li class="page-item"><a class="page-link">2</a></li>

        </nav>

        <br />

        <!--Pagination besar-->
        <h3>Membuat pagination dengan ukuran besar</h3>
        <nav aria-label="pagination besar">
            <ul class="pagination pagination-Ig">
                <li class="page-item"><a class="page-link">1</a></li>

            </ul>
        </nav>

        <br />

        <!--Pagination besar-->
        <h3>Membuat pagination dengan ukuran kecil</h3>
        <nav aria-label="pagination kecil">
            <ul class="pagination pagination-sm">
                <li class="page-item"><a class="page-link">1</a></li>
                <li class="page-item"><a class="page-link">2</a></li>
                <li class="page-item"><a class="page-link">3</a></li>
                <li class="page-item"><a class="page-link">4</a></li>
    </ul>
    </nav>
