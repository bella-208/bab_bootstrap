<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <link
    href="https:/cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css" rel=stylesheet
    />

<body>
    <!--1.Heading-->
    <p class="h1">h1. Judul seperti heading</p>
    <p class="h2">h2. Judul seperti heading</p>

    <!--2.Display Heading-->
    <h1 class="display-1">Display 1</h1>
    <h1 class="display-3">Display 3</h1>

    <!--3.paragreaf khusus-->
    <p class="lead">Ini paragraf utama yang tampil lebih besar.</p>
    
    <!--4.Inline Text-->
    <p>Gunakan <mark>mark</mark>
     untuk sorotan teks.</p>
     <p><del>Teks terhapus</del>tetap terlihat.</p>
     <p><strong>Teks tebal</strong></p>
     <p<><em>teks miring</em></p>

     <!--5.Alignment & style teks-->
     <p class="text-start">rata kiri</p>
     <p class="text-center">rata tengah</p>
     <p class="text-end">rata kanan</p>

     <p class="text-uppercase">huruf besar semua</p>
     <p class="fw-bold">teks tebal
     </p>
     <p class="fw-light">teks tipis</p>

     <!--Blackquote-->>
     <figure>
        <blackquote class="blockquote">
            <p>Kutipn penting dari sesorang.</p>
        </blackquote>
        <figcaption class="blackquote-footer">
            Nama Orang dalan <cite title="Judul Sumber">Judul Sumber</cite>
        </figure>
</body>
